name: Lint & Build
on:
    push:
        branches: ['**']
jobs:
    lint:
        name: lint (22.x)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Use Node.js 20.x
              uses: actions/setup-node@v6
              with:
                  node-version: 20.x
                  cache: 'npm'
            - run: npm ci
            - run: npm run build --if-present
            - run: npm run lint

            - name: Use Node.js 22.x
              uses: actions/setup-node@v6
              with:
                  node-version: 22.x
                  cache: 'npm'
            - run: npm ci
            - run: npm run build --if-present
            - run: npm run lint

            - name: Use Node.js 24.x
              uses: actions/setup-node@v6
              with:
                  node-version: 24.x
                  cache: 'npm'
            - run: npm ci
            - run: npm run build --if-present
            - run: npm run lint